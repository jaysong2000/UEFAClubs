<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>European Football Clubs Quiz</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--light);
        }

        /* Sidebar Styling */
        #sidebar {
            width: 250px;
            height: 100vh;
            background: white;
            border-right: 1px solid #ddd;
            position: sticky;
            top: 0;
            overflow-y: auto;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        /* Header Area (Always Visible) */
        #main-content {
            flex-grow: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #sticky-header {
            position: sticky;
            top: 0;
            background: var(--light);
            padding: 10px 0;
            border-bottom: 2px solid #ddd;
            z-index: 100;
            margin-bottom: 20px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #input-container {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            font-size: 1.1rem;
            border: 2px solid var(--primary);
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn-giveup { background: var(--danger); color: white; }
        .btn-action { background: var(--primary); color: white; }

        /* Grid Layout */
        .country-section {
            margin-bottom: 30px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .country-title {
            margin-top: 0;
            border-bottom: 2px solid var(--light);
            padding-bottom: 5px;
        }

        .club-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }

        .club-box {
            height: 40px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            text-align: center;
            background: #f9f9f9;
            color: transparent; /* Hide text until guessed */
            overflow: hidden;
            padding: 2px;
        }

        .club-box.guessed {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        .club-box.revealed {
            background: #ffdada;
            color: var(--danger);
            border-color: var(--danger);
        }

        .sidebar-controls { margin-bottom: 15px; }
        .country-item { display: block; margin: 5px 0; font-size: 0.9rem; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Countries</h3>
    <div class="sidebar-controls">
        <button class="btn-action" onclick="toggleAll(true)">Select All</button>
        <button class="btn-action" onclick="toggleAll(false)">Deselect All</button>
    </div>
    <div id="country-checklist"></div>
</div>

<div id="main-content">
    <div id="sticky-header">
        <div class="stats-bar">
            <div id="percentage">Score: 0/0 (0%)</div>
            <div id="timer">Time: 00:00</div>
            <button class="btn-giveup" id="giveup-btn">Give Up</button>
        </div>
        <div id="input-container">
            <input type="text" id="guess-input" placeholder="Enter club name..." autofocus>
        </div>
    </div>

    <div id="quiz-container">
        </div>
</div>

<script>
    let allData = [];
    let enabledCountries = new Set();
    let guessedClubs = new Set();
    let startTime = null;
    let timerInterval = null;
    let isGameOver = false;

    const guessInput = document.getElementById('guess-input');
    const quizContainer = document.getElementById('quiz-container');
    const countryChecklist = document.getElementById('country-checklist');
    const scoreDisplay = document.getElementById('percentage');
    const timerDisplay = document.getElementById('timer');

    // 1. Fetch and Parse CSV
    async function loadData() {
        try {
            const response = await fetch('clubs.csv');
            const text = await response.text();
            const lines = text.split('\n').filter(line => line.trim() !== '');

            allData = lines.map(line => {
                const [country, fullName, alias1, alias2] = line.split(',').map(s => s?.trim() || '');
                // Sanitize broken characters from encoding issues
                const cleanName = fullName.replace(/\?/g, 's').replace('Faith', 'Fatih'); 
                return { 
                    country, 
                    fullName: cleanName, 
                    aliases: [cleanName, alias1, alias2].filter(a => a !== '')
                };
            });

            // Initial Setup
            const countries = [...new Set(allData.map(d => d.country))];
            countries.forEach(c => enabledCountries.add(c));
            
            renderChecklist(countries);
            renderQuiz();
            updateStats();
        } catch (err) {
            console.error("Error loading CSV:", err);
            quizContainer.innerHTML = "<h2>Error loading clubs.csv. Please ensure the file is in the same folder.</h2>";
        }
    }

    // 2. Normalization Logic
    function normalize(str) {
        return str.normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "") // Remove accents
            .replace(/[^a-zA-Z0-9]/g, "")    // Remove spaces/punctuation
            .toLowerCase();
    }

    // 3. Rendering Functions
    function renderChecklist(countries) {
        countryChecklist.innerHTML = countries.map(c => `
            <label class="country-item">
                <input type="checkbox" checked onchange="toggleCountry('${c}')" data-country="${c}"> ${c}
            </label>
        `).join('');
    }

    function renderQuiz() {
        quizContainer.innerHTML = '';
        const grouped = {};
        
        allData.forEach(item => {
            if (!enabledCountries.has(item.country)) return;
            if (!grouped[item.country]) grouped[item.country] = [];
            grouped[item.country].push(item);
        });

        for (const [country, clubs] of Object.entries(grouped)) {
            const section = document.createElement('div');
            section.className = 'country-section';
            section.innerHTML = `
                <h3 class="country-title">${country} (${clubs.length})</h3>
                <div class="club-grid">
                    ${clubs.map(club => `
                        <div class="club-box" id="club-${normalize(club.fullName)}">
                            ${club.fullName}
                        </div>
                    `).join('')}
                </div>
            `;
            quizContainer.appendChild(section);
        }
        // Re-apply "guessed" class to items if they were already found
        guessedClubs.forEach(id => {
            const el = document.getElementById(`club-${id}`);
            if (el) el.classList.add('guessed');
        });
    }

    // 4. Game Logic
    guessInput.addEventListener('input', (e) => {
        if (isGameOver) return;
        if (!startTime) startTimer();

        const input = normalize(e.target.value);
        if (input.length < 3) return;

        allData.forEach(club => {
            if (!enabledCountries.has(club.country)) return;
            
            const clubId = normalize(club.fullName);
            if (guessedClubs.has(clubId)) return;

            const isMatch = club.aliases.some(alias => normalize(alias) === input);
            
            if (isMatch) {
                guessedClubs.add(clubId);
                const el = document.getElementById(`club-${clubId}`);
                if (el) el.classList.add('guessed');
                guessInput.value = '';
                updateStats();
                checkWin();
            }
        });
    });

    function toggleCountry(country) {
        if (enabledCountries.has(country)) {
            enabledCountries.delete(country);
            // Remove progress for THIS country only as requested
            allData.filter(d => d.country === country).forEach(d => {
                guessedClubs.delete(normalize(d.fullName));
            });
        } else {
            enabledCountries.add(country);
        }
        renderQuiz();
        updateStats();
    }

    function toggleAll(bool) {
        const checkboxes = countryChecklist.querySelectorAll('input');
        checkboxes.forEach(cb => {
            if (cb.checked !== bool) {
                cb.checked = bool;
                const country = cb.getAttribute('data-country');
                if (bool) enabledCountries.add(country);
                else {
                    enabledCountries.delete(country);
                    allData.filter(d => d.country === country).forEach(d => guessedClubs.delete(normalize(d.fullName)));
                }
            }
        });
        renderQuiz();
        updateStats();
    }

    function updateStats() {
        const totalEnabled = allData.filter(d => enabledCountries.has(d.country)).length;
        const currentScore = guessedClubs.size;
        const percent = totalEnabled === 0 ? 0 : Math.round((currentScore / totalEnabled) * 100);
        scoreDisplay.innerText = `Score: ${currentScore}/${totalEnabled} (${percent}%)`;
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const delta = Date.now() - startTime;
            const mins = Math.floor(delta / 60000).toString().padStart(2, '0');
            const secs = Math.floor((delta % 60000) / 1000).toString().padStart(2, '0');
            timerDisplay.innerText = `Time: ${mins}:${secs}`;
        }, 1000);
    }

    document.getElementById('giveup-btn').addEventListener('click', () => {
        isGameOver = true;
        clearInterval(timerInterval);
        guessInput.disabled = true;
        
        document.querySelectorAll('.club-box').forEach(box => {
            if (!box.classList.contains('guessed')) {
                box.classList.add('revealed');
            }
        });
    });

    function checkWin() {
        const totalEnabled = allData.filter(d => enabledCountries.has(d.country)).length;
        if (guessedClubs.size === totalEnabled && totalEnabled > 0) {
            isGameOver = true;
            clearInterval(timerInterval);
            alert("Congratulations! You've named every club!");
        }
    }

    loadData();
</script>

</body>
</html>
